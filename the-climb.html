<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Climb — Daily Trivia Challenge</title>
<!--
  ═══════════════════════════════════════════════
  THE CLIMB v2 — Production Build
  ═══════════════════════════════════════════════
  Before going live, replace these two values:

  SUPABASE_URL  → your project URL from Supabase dashboard
  SUPABASE_KEY  → your anon/public key from Supabase dashboard

  Questions are fetched from Supabase (pre-generated daily).
  No API keys are exposed in this file.
  ═══════════════════════════════════════════════
-->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Instrument+Sans:wght@300;400;500;600&family=Instrument+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#09090B; --s1:#111114; --s2:#18181C; --s3:#1F1F25; --s4:#26262E;
  --b1:#252529; --b2:#2E2E36; --b3:#3C3C46;
  --tx:#EDEAE2; --tm:#6E6E78; --td:#32323A;
  --easy:#3EE07A; --easy-g:rgba(62,224,122,0.12); --easy-b:rgba(62,224,122,0.28);
  --med:#F6CB3A;  --med-g:rgba(246,203,58,0.12);  --med-b:rgba(246,203,58,0.28);
  --hard:#F06565; --hard-g:rgba(240,101,101,0.12); --hard-b:rgba(240,101,101,0.28);
  --gold:#C8962E; --goldl:#E9B94A;
  --ok:#3EE07A; --err:#F06565; --warn:#F6CB3A;
  --r:6px; --rl:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(200,150,46,0.04),transparent);pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── HEADER ── */
header{border-bottom:1px solid var(--b1);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;background:rgba(9,9,11,0.88);backdrop-filter:blur(24px);}
.logo{font-family:'Playfair Display',serif;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;}
.logo .dot{color:var(--goldl);}
.nav{display:flex;gap:2px;}
.np{padding:5px 12px;border-radius:100px;font-size:12px;font-family:'Instrument Mono',monospace;letter-spacing:0.3px;cursor:pointer;border:1px solid transparent;background:none;color:var(--tm);transition:all 0.15s;}
.np:hover{color:var(--tx);border-color:var(--b2);}
.np.on{background:var(--s2);border-color:var(--b2);color:var(--tx);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.streak-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--b1);border-radius:100px;font-family:'Instrument Mono',monospace;font-size:11px;color:var(--tm);}
.auth-btn{padding:6px 14px;border-radius:var(--r);font-size:12px;font-family:'Instrument Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;}
.auth-btn.si{background:var(--tx);color:var(--bg);}
.auth-btn.si:hover{opacity:0.85;}
.auth-btn.so{background:var(--s2);border:1px solid var(--b2);color:var(--tm);}
.auth-btn.so:hover{color:var(--tx);}
.uav{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldl));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--bg);cursor:pointer;}

/* ── PAGES ── */
.page{display:none;flex:1;flex-direction:column;position:relative;z-index:1;}
.page.on{display:flex;}

/* ── LOADING ── */
#pgLoad{align-items:center;justify-content:center;min-height:calc(100vh - 54px);}
.load-wrap{text-align:center;padding:40px 24px;}
.load-logo{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;letter-spacing:6px;margin-bottom:6px;animation:lPop 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.load-logo .dot{color:var(--goldl);}
@keyframes lPop{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.load-tagline{font-family:'Instrument Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--tm);margin-bottom:44px;}
.load-bar-wrap{width:260px;height:2px;background:var(--b1);border-radius:1px;margin:0 auto 16px;overflow:hidden;}
.load-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--goldl));border-radius:1px;transition:width 0.6s ease;}
.load-msg{font-family:'Instrument Mono',monospace;font-size:11px;color:var(--tm);letter-spacing:0.5px;}
.load-err{margin-top:20px;padding:16px 20px;background:rgba(240,101,101,0.08);border:1px solid rgba(240,101,101,0.2);border-radius:var(--r);font-size:13px;color:var(--err);max-width:320px;margin-left:auto;margin-right:auto;display:none;}
.load-err a{color:var(--err);cursor:pointer;text-decoration:underline;}

/* ── HOME ── */
#pgHome{padding:0 0 80px;}
.home-hero{padding:36px 24px 30px;border-bottom:1px solid var(--b1);position:relative;overflow:hidden;}
.home-hero::before{content:'';position:absolute;top:-80px;right:-60px;width:340px;height:340px;background:radial-gradient(circle,rgba(200,150,46,0.05),transparent 70%);pointer-events:none;}
.hero-date{font-family:'Instrument Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--td);margin-bottom:12px;}
.hero-h{font-family:'Playfair Display',serif;font-size:clamp(30px,5vw,46px);font-weight:900;line-height:1.08;margin-bottom:10px;}
.hero-h em{font-style:italic;color:var(--goldl);}
.hero-p{font-size:13px;color:var(--tm);line-height:1.65;max-width:360px;}
.home-body{padding:20px 20px 0;max-width:580px;margin:0 auto;width:100%;}

.day-strip{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:16px;}
.ds-label{font-family:'Instrument Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tm);}
.ds-dots{display:flex;gap:6px;margin-right:auto;}
.ds-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--b3);transition:all 0.4s;}
.ds-dot.de{background:var(--easy);border-color:var(--easy);box-shadow:0 0 6px var(--easy);}
.ds-dot.dm{background:var(--med);border-color:var(--med);box-shadow:0 0 6px var(--med);}
.ds-dot.dh{background:var(--hard);border-color:var(--hard);box-shadow:0 0 6px var(---hard);}
.ds-pts{font-family:'Playfair Display',serif;font-size:18px;color:var(--goldl);}
.mcards{display:flex;flex-direction:column;gap:11px;margin-bottom:20px;}
.mcard{border:1px solid var(--b1);border-radius:var(--rl);padding:20px 22px;cursor:pointer;transition:all 0.22s;background:var(--s1);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.mc-shine{position:absolute;inset:0;opacity:0;transition:opacity 0.25s;}
.ec .mc-shine{background:var(--easy-g);}
.mc2 .mc-shine{background:var(--med-g);}
.hc .mc-shine{background:var(--hard-g);}
.mcard:hover{transform:translateY(-2px);}
.ec:hover{border-color:var(--easy-b);box-shadow:0 6px 28px rgba(62,224,122,0.07);}
.mc2:hover{border-color:var(--med-b);box-shadow:0 6px 28px rgba(246,203,58,0.07);}
.hc:hover{border-color:var(--hard-b);box-shadow:0 6px 28px rgba(240,101,101,0.07);}
.mcard:hover .mc-shine{opacity:1;}
.mcard.played{opacity:0.44;cursor:default;pointer-events:none;}
.mc-l{position:relative;z-index:1;}
.mc-n{font-family:'Instrument Mono',monospace;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px;}
.ec .mc-n{color:var(--easy);} .mc2 .mc-n{color:var(--med);} .hc .mc-n{color:var(--hard);}
.mc-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:3px;}
.mc-desc{font-size:12px;color:var(--tm);line-height:1.45;}
.mc-badge{display:inline-flex;align-items:center;gap:4px;margin-top:9px;padding:3px 8px;border-radius:100px;font-size:10px;font-family:'Instrument Mono',monospace;}
.mc-badge.np{background:var(--s2);color:var(--tm);border:1px solid var(--b2);}
.mc-badge.dn{background:rgba(62,224,122,0.1);color:var(--easy);border:1px solid var(--easy-b);}
.mc-r{position:relative;z-index:1;text-align:right;flex-shrink:0;}
.mc-rung{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;line-height:1;}
.ec .mc-rung{color:var(--easy);} .mc2 .mc-rung{color:var(--med);} .hc .mc-rung{color:var(--hard);}
.mc-rl{font-family:'Instrument Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--tm);margin-top:2px;}
.mc-time{font-family:'Instrument Mono',monospace;font-size:11px;color:var(--tm);margin-top:3px;}

/* ── LEADERBOARD ── */
#pgLeader{padding:24px 20px 80px;max-width:620px;margin:0 auto;width:100%;}
.lb-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:gap;}
.lb-hdr h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;}
.lb-tabs{display:flex;gap:4px;background:var(--s2);border:1px solid var(--b1);border-radius:100px;padding:3px;}
.lb-tab{padding:5px 14px;border-radius:100px;font-family:'Instrument Mono',monospace;font-size:11px;cursor:pointer;border:none;background:none;color:var(--tm);transition:all 0.15s;}
.lb-tab.on{background:var(--s3);color:var(--tx);}
.lb-mtabs{display:flex;gap:6px;margin-bottom:16px;}
.lmt{padding:6px 14px;border-radius:100px;font-family:'Instrument Mono',monospace;font-size:11px;cursor:pointer;border:1px solid var(--b2);background:none;color:var(--tm);transition:all 0.15s;}
.lmt:hover{color:var(--tx);}
.lmt.on.et{border-color:var(--easy-b);color:var(--easy);background:var(--easy-g);}
.lmt.on.mt{border-color:var(--med-b);color:var(--med);background:var(--med-g);}
.lmt.on.ht{border-color:var(--hard-b);color:var(--hard);background:var(--hard-g);}

.fcb{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:18px 20px;margin-bottom:20px;}
.fcb-t{font-family:'Instrument Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tm);margin-bottom:8px;}
.fcb-d{font-size:13px;color:var(--tm);margin-bottom:12px;line-height:1.5;}
.fcb-row{display:flex;gap:8px;}
.fcb-inp{flex:1;padding:9px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);color:var(--tx);font-family:'Instrument Mono',monospace;font-size:11px;outline:none;}
.fcb-inp:focus{border-color:var(--goldl);}
.fbtn{padding:9px 14px;border:none;border-radius:var(--r);font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity 0.15s;}
.fbtn.p{background:var(--tx);color:var(--bg);}
.fbtn.p:hover{opacity:0.85;}
.fbtn.s{background:var(--s3);border:1px solid var(--b2);color:var(--tm);}
.fbtn.s:hover{color:var(--tx);}

.lb-tbl{width:100%;border-collapse:collapse;}
.lb-tbl th{font-family:'Instrument Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tm);padding:0 10px 10px 0;text-align:left;border-bottom:1px solid var(--b1);}
.lb-tbl td{padding:13px 10px 13px 0;border-bottom:1px solid var(--b1);font-size:13px;vertical-align:middle;}
.lb-tbl tr:last-child td{border-bottom:none;}
.lb-tbl tr.me td{background:rgba(200,150,46,0.05);}
.lb-rank{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--tm);width:36px;}
.lb-rank.gd{color:var(--goldl);} .lb-rank.sv{color:#AAB0BB;} .lb-rank.br{color:#C4855A;}
.lb-nm{font-weight:500;}
.lb-nm .you{font-size:10px;font-family:'Instrument Mono',monospace;color:var(--goldl);margin-left:6px;}
.lb-rung{font-family:'Instrument Mono',monospace;font-weight:500;}
.lb-time{font-family:'Instrument Mono',monospace;font-size:12px;color:var(--tm);}
.lb-sc{font-family:'Playfair Display',serif;font-size:16px;color:var(--goldl);}
.lb-empty{text-align:center;padding:40px;color:var(--tm);font-size:14px;line-height:1.7;}
.lb-loading{text-align:center;padding:32px;color:var(--tm);font-family:'Instrument Mono',monospace;font-size:12px;letter-spacing:1px;}
